<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AlmaU Task Tracker | профессиональный дашборд</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-page: #f9f6f0;
            --card-bg: #ffffff;
            --border-light: #e9e2d4;
            --accent-chocolate: #4a3728;
            --accent-coffee: #634832;
            --accent-soft: #8b7355;
            --text-primary: #2c241a;
            --text-secondary: #6b5a4a;
            --error-bg: #fef3f0;
            --error-border: #d99e8e;
            --error-text: #b45a48;
            --priority-high: #c97e5a;
            --priority-medium: #e0b48c;
            --priority-low: #bcae8e;
            --shadow-sm: 0 8px 20px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
            --shadow-hover: 0 20px 32px -12px rgba(0,0,0,0.12), 0 2px 4px rgba(0,0,0,0.02);
            --transition: all 0.25s cubic-bezier(0.2,0,0,1);
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'Fira Code', 'SF Mono', 'Courier New', monospace;
        }
        body { background-color: var(--bg-page); font-family: var(--font-sans); color: var(--text-primary); line-height: 1.5; padding: 2rem 1.5rem; min-height: 100vh; }
        .hidden { display: none !important; }
        .app-container { max-width: 1440px; margin: 0 auto; }
        .auth-wrapper { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .auth-card { background: var(--card-bg); border-radius: 32px; box-shadow: var(--shadow-sm); width: 100%; max-width: 460px; padding: 2rem; border: 1px solid var(--border-light); }
        .auth-tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border-light); padding-bottom: 0.5rem; }
        .auth-tab { background: none; border: none; font-size: 1rem; font-weight: 500; padding: 0.5rem 0; cursor: pointer; color: var(--text-secondary); transition: var(--transition); font-family: var(--font-sans); }
        .auth-tab.active { color: var(--accent-chocolate); border-bottom: 2px solid var(--accent-chocolate); margin-bottom: -0.5rem; }
        .input-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); margin-bottom: 0.4rem; }
        input, select { width: 100%; background: #fffefb; border: 1px solid var(--border-light); border-radius: 20px; padding: 0.85rem 1rem; font-size: 0.95rem; font-family: var(--font-sans); transition: var(--transition); color: var(--text-primary); }
        input:focus, select:focus { outline: none; border-color: var(--accent-chocolate); box-shadow: 0 0 0 3px rgba(74,55,40,0.1); }
        .btn-primary { width: 100%; background: var(--accent-chocolate); color: white; border: none; border-radius: 40px; padding: 0.85rem; font-weight: 600; font-size: 0.95rem; font-family: var(--font-sans); cursor: pointer; transition: var(--transition); margin-top: 0.5rem; }
        .btn-primary:hover { background: #2f2118; transform: translateY(-1px); }
        .error-banner { background: var(--error-bg); border-left: 4px solid var(--error-border); border-radius: 16px; padding: 0.75rem 1rem; font-size: 0.8rem; color: var(--error-text); margin-top: 1rem; }
        .main-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-light); }
        .logo h1 { font-size: 1.8rem; font-weight: 600; letter-spacing: -0.5px; color: var(--accent-chocolate); }
        .logo p { color: var(--text-secondary); font-size: 0.85rem; font-family: var(--font-mono); }
        .user-info { display: flex; align-items: center; gap: 1rem; background: var(--card-bg); padding: 0.5rem 1rem; border-radius: 60px; border: 1px solid var(--border-light); }
        .logout-btn { background: none; border: none; font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent-soft); cursor: pointer; transition: var(--transition); }
        .logout-btn:hover { color: var(--error-text); }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1.8fr; gap: 2rem; align-items: start; }
        .create-card, .employee-placeholder { background: var(--card-bg); border: 1px solid var(--border-light); border-radius: 28px; padding: 1.8rem; box-shadow: var(--shadow-sm); }
        .form-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .priority-toggle { display: flex; gap: 0.75rem; margin: 0.5rem 0 1rem; }
        .priority-btn { flex: 1; background: transparent; border: 1px solid var(--border-light); border-radius: 40px; padding: 0.6rem; font-family: var(--font-mono); font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: var(--transition); }
        .priority-btn.active { background: var(--accent-chocolate); border-color: var(--accent-chocolate); color: white; }
        .btn-submit { width: 100%; background: var(--accent-chocolate); color: white; border: none; border-radius: 40px; padding: 0.85rem; font-weight: 600; margin-top: 0.5rem; cursor: pointer; }
        .stats-row { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .stat-card { background: #fefaf5; border-radius: 24px; padding: 1rem; text-align: center; flex: 1; border: 1px solid var(--border-light); }
        .stat-number { font-size: 2.2rem; font-weight: 700; color: var(--accent-chocolate); }
        .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.8rem; flex-wrap: wrap; }
        .tab-btn { background: transparent; border: none; padding: 0.5rem 1.2rem; border-radius: 40px; font-family: var(--font-mono); font-size: 0.8rem; cursor: pointer; transition: var(--transition); }
        .tab-btn.active { background: var(--accent-chocolate); color: white; }
        .tasks-list { display: flex; flex-direction: column; gap: 1rem; }
        .task-card { background: #fefcf8; border: 1px solid var(--border-light); border-radius: 20px; padding: 1.2rem; transition: var(--transition); animation: fadeIn 0.2s ease; }
        .task-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
        .task-card.priority-high { border-left: 4px solid var(--priority-high); }
        .task-card.priority-medium { border-left: 4px solid var(--priority-medium); }
        .task-card.priority-low { border-left: 4px solid var(--priority-low); }
        .task-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
        .task-title { font-weight: 700; font-size: 1rem; }
        .task-priority-badge { font-size: 0.7rem; background: #f0e8df; padding: 0.2rem 0.7rem; border-radius: 20px; }
        .task-description { font-size: 0.85rem; color: var(--text-secondary); margin: 0.5rem 0; }
        .task-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 0.75rem; }
        .status-select { background: white; border: 1px solid var(--border-light); border-radius: 30px; padding: 0.3rem 0.7rem; font-family: var(--font-mono); font-size: 0.7rem; }
        .delete-btn { background: none; border: none; font-family: var(--font-mono); color: var(--accent-soft); cursor: pointer; font-size: 0.75rem; }
        .delete-btn:hover { color: var(--error-text); }
        .footer { margin-top: 3rem; text-align: center; font-size: 0.7rem; color: var(--text-secondary); border-top: 1px solid var(--border-light); padding-top: 1.5rem; font-family: var(--font-mono); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 780px) { body { padding: 1rem; } .dashboard-grid { grid-template-columns: 1fr; gap: 1.5rem; } }
    </style>
</head>
<body>
<div class="app-container">
    <div id="authBlock">
        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Вход</button>
                    <button class="auth-tab" data-tab="register">Регистрация</button>
                </div>
                <div id="loginForm">
                    <div class="input-group"><label>EMAIL</label><input type="email" id="loginEmail" placeholder="ali@almau.kz"></div>
                    <div class="input-group"><label>ПАРОЛЬ</label><input type="password" id="loginPassword" placeholder="••••••"></div>
                    <button class="btn-primary" id="doLoginBtn">Войти</button>
                    <div id="loginError" class="error-banner" style="display:none;"></div>
                </div>
                <div id="registerForm" style="display:none;">
                    <div class="input-group"><label>ИМЯ ПОЛЬЗОВАТЕЛЯ</label><input type="text" id="regUsername" placeholder="Алибек"></div>
                    <div class="input-group"><label>EMAIL</label><input type="email" id="regEmail" placeholder="user@almau.kz"></div>
                    <div class="input-group"><label>ПАРОЛЬ</label><input type="password" id="regPassword" placeholder="••••••"></div>
                    <button class="btn-primary" id="doRegisterBtn">Зарегистрироваться</button>
                    <div id="regError" class="error-banner" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="mainBlock" class="hidden">
        <div class="main-header">
            <div class="logo">
                <h1>📋 AlmaU Task Tracker</h1>
                <p>управление задачами • приоритеты • роли</p>
            </div>
            <div class="user-info">
                <span id="userEmailSpan"></span>
                <button class="logout-btn" id="logoutBtn">Выйти</button>
            </div>
        </div>
        <div class="dashboard-grid">
            <div id="leftPanel">
                <div id="adminForm" class="create-card">
                    <div class="form-title">✎ Новая задача</div>
                    <div class="input-group"><label>НАЗВАНИЕ</label><input type="text" id="taskTitle" placeholder="Например: Подготовить отчёт"></div>
                    <div class="input-group"><label>ОПИСАНИЕ</label><textarea id="taskDesc" rows="3" style="resize:vertical;width:100%;border-radius:20px;border:1px solid var(--border-light);padding:0.7rem;font-family:var(--font-sans);"></textarea></div>
                    <div class="input-group"><label>НАЗНАЧИТЬ СОТРУДНИКУ</label><select id="assignedUserId"><option value="">-- Выберите сотрудника (оставьте пустым для себя) --</option></select></div>
                    <label>ПРИОРИТЕТ</label>
                    <div class="priority-toggle">
                        <button type="button" data-priority="Low" class="priority-btn">LOW</button>
                        <button type="button" data-priority="Medium" class="priority-btn active">MEDIUM</button>
                        <button type="button" data-priority="High" class="priority-btn">HIGH</button>
                    </div>
                    <button class="btn-submit" id="createTaskBtn">➕ Создать</button>
                </div>
                <div id="employeePlaceholder" class="employee-placeholder hidden">
                    <p>🔒 Доступно только для Администратора</p>
                </div>
            </div>
            <div class="tasks-panel" style="background:var(--card-bg);border-radius:28px;padding:1.8rem;border:1px solid var(--border-light);">
                <div class="stats-row">
                    <div class="stat-card"><div class="stat-number" id="totalCount">0</div><div>Всего задач</div></div>
                    <div class="stat-card"><div class="stat-number" id="inProgressCount">0</div><div>В работе</div></div>
                    <div class="stat-card"><div class="stat-number" id="doneCount">0</div><div>Выполнено</div></div>
                </div>
                <div class="filter-tabs">
                    <button data-filter="All" class="tab-btn active">Все</button>
                    <button data-filter="New" class="tab-btn">New</button>
                    <button data-filter="In Progress" class="tab-btn">In Progress</button>
                    <button data-filter="Done" class="tab-btn">Done</button>
                </div>
                <div id="tasksList" class="tasks-list"><div class="stat-card" style="text-align:center;">Загрузка...</div></div>
            </div>
        </div>
        <div class="footer">CORE: FastAPI // DATABASE: SQLITE // DEPLOY: RENDER.COM</div>
    </div>
</div>

<script>
    const API_BASE = 'https://university-task-tracker.onrender.com';
    let currentUser = null, tasksArray = [], currentFilter = 'All', selectedPriority = 'Medium';

    const authBlock = document.getElementById('authBlock');
    const mainBlock = document.getElementById('mainBlock');

    document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            if (tab.dataset.tab === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
        });
    });

    function showAuthError(msg, isLogin = true) {
        const el = document.getElementById(isLogin ? 'loginError' : 'regError');
        el.textContent = msg; el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 5000);
    }

    async function handleRegister() {
        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        if (!username || !email || !password) { showAuthError('Заполните все поля', false); return; }
        try {
            const resp = await fetch(`${API_BASE}/register`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, email, password}) });
            if (!resp.ok) { const e = await resp.json(); throw new Error(e.detail || 'Ошибка регистрации'); }
            alert('Регистрация успешна! Теперь войдите.');
            document.querySelector('.auth-tab[data-tab="login"]').click();
            document.getElementById('loginEmail').value = email;
        } catch(err) { showAuthError(err.message, false); }
    }

    async function handleLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        if (!email || !password) { showAuthError('Введите email и пароль'); return; }
        try {
            const resp = await fetch(`${API_BASE}/login`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
            if (!resp.ok) { const e = await resp.json(); throw new Error(e.detail || 'Неверные данные'); }
            const data = await resp.json();
            currentUser = data.user;
            sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
            sessionStorage.setItem('token', data.access_token);
            authBlock.classList.add('hidden');
            mainBlock.classList.remove('hidden');
            document.getElementById('userEmailSpan').textContent = currentUser.email;
            applyRoleUI();
            if (currentUser.role === 'Admin') loadUsers();
            await loadTasks();
        } catch(err) { showAuthError(err.message); }
    }

    async function loadUsers() {
        try {
            const resp = await fetch(`${API_BASE}/users?user_id=${currentUser.id}`);
            if (!resp.ok) return;
            const users = await resp.json();
            const select = document.getElementById('assignedUserId');
            select.innerHTML = '<option value="">-- Выберите сотрудника --</option>' +
                users.filter(u => u.id !== currentUser.id).map(u => `<option value="${u.id}">${u.username} (${u.email})</option>`).join('');
        } catch(e) {}
    }

    function handleLogout() {
        currentUser = null;
        sessionStorage.removeItem('currentUser');
        sessionStorage.removeItem('token');
        authBlock.classList.remove('hidden');
        mainBlock.classList.add('hidden');
        tasksArray = [];
    }

    function applyRoleUI() {
        const isAdmin = currentUser && currentUser.role === 'Admin';
        document.getElementById('adminForm').classList.toggle('hidden', !isAdmin);
        document.getElementById('employeePlaceholder').classList.toggle('hidden', isAdmin);
    }

    async function loadTasks() {
        try {
            const resp = await fetch(`${API_BASE}/tasks?user_id=${currentUser.id}`);
            if (!resp.ok) throw new Error();
            tasksArray = await resp.json();
            renderTasks(); updateStats();
        } catch(e) { tasksArray = []; renderTasks(); }
    }

    function renderTasks() {
        const filtered = currentFilter === 'All' ? tasksArray : tasksArray.filter(t => t.status === currentFilter);
        const container = document.getElementById('tasksList');
        if (!filtered.length) { container.innerHTML = '<div class="stat-card" style="text-align:center;">📭 Нет задач</div>'; return; }
        container.innerHTML = filtered.map(task => {
            const pc = task.priority === 'High' ? 'priority-high' : task.priority === 'Medium' ? 'priority-medium' : 'priority-low';
            return `<div class="task-card ${pc}">
                <div class="task-header">
                    <div class="task-title">${escapeHtml(task.title)}</div>
                    <div class="task-priority-badge">${task.priority.toUpperCase()}</div>
                </div>
                <div class="task-description">${escapeHtml(task.description || '—')}</div>
                <div class="task-meta">
                    <select class="status-select" data-id="${task.id}">
                        <option value="New" ${task.status==='New'?'selected':''}>New</option>
                        <option value="In Progress" ${task.status==='In Progress'?'selected':''}>In Progress</option>
                        <option value="Done" ${task.status==='Done'?'selected':''}>Done</option>
                    </select>
                    ${currentUser.role==='Admin' ? `<button class="delete-btn" data-id="${task.id}">[Удалить]</button>` : ''}
                </div>
            </div>`;
        }).join('');
        document.querySelectorAll('.status-select').forEach(s => s.addEventListener('change', handleStatusChange));
        document.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', handleDelete));
    }

    function updateStats() {
        document.getElementById('totalCount').textContent = tasksArray.length;
        document.getElementById('inProgressCount').textContent = tasksArray.filter(t => t.status === 'In Progress').length;
        document.getElementById('doneCount').textContent = tasksArray.filter(t => t.status === 'Done').length;
    }

    async function handleStatusChange(e) {
        const taskId = parseInt(e.target.dataset.id);
        const newStatus = e.target.value;
        const task = tasksArray.find(t => t.id === taskId);
        if (!task || task.status === newStatus) return;
        const old = task.status;
        task.status = newStatus;
        try {
            const resp = await fetch(`${API_BASE}/tasks/${taskId}`, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({status: newStatus}) });
            if (!resp.ok) throw new Error();
            updateStats();
        } catch(err) { task.status = old; renderTasks(); }
    }

    async function handleDelete(e) {
        const taskId = parseInt(e.target.dataset.id);
        if (!confirm('Удалить задачу?')) return;
        try {
            await fetch(`${API_BASE}/tasks/${taskId}?user_id=${currentUser.id}`, {method: 'DELETE'});
            await loadTasks();
        } catch(err) {}
    }

    async function createTask() {
        if (!currentUser || currentUser.role !== 'Admin') return;
        const title = document.getElementById('taskTitle').value.trim();
        if (!title) return;
        const description = document.getElementById('taskDesc').value.trim();
        const assignedUserId = document.getElementById('assignedUserId').value;
        const user_id = assignedUserId ? parseInt(assignedUserId) : currentUser.id;
        try {
            const resp = await fetch(`${API_BASE}/tasks`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({title, description, priority: selectedPriority, user_id}) });
            if (!resp.ok) throw new Error();
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDesc').value = '';
            document.getElementById('assignedUserId').value = '';
            await loadTasks();
        } catch(err) { alert('Ошибка создания задачи'); }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
    }

    document.querySelectorAll('#adminForm .priority-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            selectedPriority = btn.dataset.priority;
            document.querySelectorAll('#adminForm .priority-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });
    document.querySelectorAll('.filter-tabs .tab-btn').forEach(tab => {
        tab.addEventListener('click', () => {
            currentFilter = tab.dataset.filter;
            document.querySelectorAll('.filter-tabs .tab-btn').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            renderTasks();
        });
    });
    document.getElementById('createTaskBtn').addEventListener('click', createTask);
    document.getElementById('doLoginBtn').addEventListener('click', handleLogin);
    document.getElementById('doRegisterBtn').addEventListener('click', handleRegister);
    document.getElementById('logoutBtn').addEventListener('click', handleLogout);

    const saved = sessionStorage.getItem('currentUser');
    if (saved) {
        try {
            currentUser = JSON.parse(saved);
            authBlock.classList.add('hidden');
            mainBlock.classList.remove('hidden');
            document.getElementById('userEmailSpan').textContent = currentUser.email;
            applyRoleUI();
            if (currentUser.role === 'Admin') loadUsers();
            loadTasks();
        } catch(e) {}
    }
</script>
</body>
</html>
